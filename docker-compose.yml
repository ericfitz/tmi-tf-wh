services:
  tmi-tf-wh:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.local
    image: tmi-tf-wh:local
    container_name: tmi-tf-wh
    ports:
      - "8088:8088"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
